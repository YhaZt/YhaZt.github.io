name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'assets/**'
      - 'index.html'
      - '404.html'
      - '.nojekyll'
      - 'favicon.svg'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /
          VITE_CONTACT_EMAIL: ${{ secrets.VITE_CONTACT_EMAIL }}
          VITE_WEB3FORMS_ACCESS_KEY: ${{ secrets.VITE_WEB3FORMS_ACCESS_KEY }}

      - name: Copy built site to repo root for GitHub Pages
        run: |
          if [ -f dist/index.source.html ] && [ ! -f dist/index.html ]; then
            cp dist/index.source.html dist/index.html
          fi
          cp dist/index.html index.html
          rm -rf assets
          cp -r dist/assets assets
          cp dist/favicon.svg favicon.svg
          cp dist/404.html 404.html
          touch .nojekyll

      - name: Commit and push built site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html assets 404.html .nojekyll favicon.svg
          if git diff --staged --quiet; then
            echo "No changes to publish"
            exit 0
          fi
          git commit -m "chore: publish built site [skip ci]"
          git push
